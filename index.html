<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My To Do List.</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<div class="heading">
    <h1>My To Do List.</h1>
</div>

<div class="mainbody">
    <div class="body">
        <div class="addlist">
            <input type="text" id="input" placeholder="Enter a task">
            <button id="addbtn">Add Task</button>
        </div>

        <div class="histoy">
            <div class="boxs">
                <div class="box">
                <div class="Task1 taskBox">Add Task1 <i class="fa-solid fa-circle-check icon"></i></div>
                <div class="Task2 taskBox">Add Task2 <i class="fa-solid fa-circle-check icon"></i></div>
                <div class="Task3 taskBox">Add Task3 <i class="fa-solid fa-circle-check icon"></i></div>
                <div class="Task4 taskBox">Add Task4 <i class="fa-solid fa-circle-check icon"></i></div>
                <div class="Task5 taskBox">Add Task5 <i class="fa-solid fa-circle-check icon"></i></div>
                </div>
            </div>
        </div>
    </div>
</div>

<body>
<script src="code.js"></script>
</body>
</html>
